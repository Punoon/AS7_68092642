<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าลงทะเบียนพร้อมเมนูและวิดีโอ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 1. Video Background */
        .video-wrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        #myVideo {
            width: 100%; height: 100%;
            object-fit: cover;
        }

        /* 2. Custom Navbar (โปร่งแสง) */
        .navbar {
            background: rgba(0, 0, 0, 0.5) !important;
            backdrop-filter: blur(5px);
        }
        .navbar-brand, .nav-link {
            color: white !important;
        }

        /* 3. Registration Card */
        .registration-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            margin-top: 80px; /* เว้นที่ให้ Navbar */
        }

        .page-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .controls { margin-top: 20px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">Porntipa Padjai</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="#">หน้าแรก</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">เกี่ยวกับเรา</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">ติดต่อ</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="video-wrapper">
        <video autoplay muted loop id="myVideo">
            <source src="91562-629172467_medium.mp4" type="video/mp4">
        </video>
    </div>

    <div class="page-container">
        <div class="registration-card">
            <h3 class="text-center mb-4 fw-bold">แบบฟอร์มลงทะเบียน</h3>
            
            <form id="regForm" class="needs-validation" novalidate>
                <div class="mb-3">
                    <label class="form-label">ชื่อ-นามสกุล:</label>
                    <input type="text" class="form-control" placeholder="กรุณากรอกชื่อ-นามสกุล" required>
                    <div class="invalid-feedback">กรุณากรอกชื่อ-นามสกุล</div>
                </div>

                <div class="mb-3">
                    <label class="form-label">อีเมล:</label>
                    <input type="email" class="form-control" placeholder="example@domain.com" required>
                    <div class="invalid-feedback">กรุณากรอกอีเมลที่ถูกต้อง</div>
                </div>

                <div class="mb-3">
                    <label class="form-label">รหัสผ่าน:</label>
                    <input type="password" class="form-control" required>
                    <div class="invalid-feedback">กรุณากรอกรหัสผ่าน</div>
                </div>

                <div class="mb-3">
                    <label class="form-label d-block">เพศ:</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="gender" id="male" checked>
                        <label class="form-check-label" for="male">ชาย</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="gender" id="female">
                        <label class="form-check-label" for="female">หญิง</label>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">ตำแหน่ง:</label>
                    <select class="form-select">
                            <option selected disabled>Please select a position</option>
                            <option>Developer</option>
                            <option>Manager</option>
                            <option>Designer</option>
                            <option>Marketing</option>
                        </select>
                    <div class="invalid-feedback">กรุณาระบุตำแหน่ง</div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary w-100 py-2">ลงทะเบียน</button>
                    <button type="reset" class="btn btn-outline-danger w-100 py-2">ล้างข้อมูล</button>
                </div>
            </form>
        </div>

        <div class="controls">
            <button onclick="playVid()" class="btn btn-warning px-4 fw-bold">Play</button>
            <button onclick="pauseVid()" class="btn btn-dark px-4 fw-bold">Stop</button>
        </div>
    </div>

    <script>
        // ควบคุมวิดีโอ
        const vid = document.getElementById("myVideo");
        function playVid() { vid.play(); }
        function pauseVid() { vid.pause(); }

        // ตรวจสอบการกรอกข้อมูล
        (function () {
            'use strict'
            const forms = document.querySelectorAll('.needs-validation')
            Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    } else {
                        alert("ลงทะเบียนสำเร็จแล้ว!");
                    }
                    form.classList.add('was-validated')
                }, false)
            })
        })()
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
